<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Dienstplan Generator</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand-head">
        <img src="icons/icon-192.png" alt="Icon" class="brand-icon" />
        <div>
          <h1>Dienstplan Generator</h1>
          <p class="subtitle">Installierbare PWA · lokal speichernd · Smartphone optimiert</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="installBtn" class="primary ghost hidden">Installieren</button>
      </div>
    </header>

    <main class="content">
      <section id="tab-team" class="tab-page active"></section>
      <section id="tab-urlaub" class="tab-page"></section>
      <section id="tab-generieren" class="tab-page"></section>
      <section id="tab-plaene" class="tab-page"></section>
      <section id="tab-settings" class="tab-page"></section>
    </main>

    <nav class="bottom-nav" aria-label="Navigation">
      <button data-tab="team" class="nav-btn active" type="button">
        <span class="nav-ico">👥</span><span class="nav-label">Team</span>
      </button>
      <button data-tab="urlaub" class="nav-btn" type="button">
        <span class="nav-ico">🗓️</span><span class="nav-label">Urlaub</span>
      </button>
      <button data-tab="generieren" class="nav-btn" type="button">
        <span class="nav-ico">⚙️</span><span class="nav-label">Generieren</span>
      </button>
      <button data-tab="plaene" class="nav-btn" type="button">
        <span class="nav-ico">📄</span><span class="nav-label">Pläne</span>
      </button>
      <button data-tab="settings" class="nav-btn" type="button">
        <span class="nav-ico">🔧</span><span class="nav-label">Einstellungen</span>
      </button>
    </nav>
  </div>

  <dialog id="modal"></dialog>

  <script src="app.js"></script>
</body>
</html>
